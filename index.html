<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long O Sorting Game</title>
<style>
  body { 
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
    /* A soft, sunny blue gradient background built with code */
    background: linear-gradient(135deg, #e0f7fa 0%, #81d4fa 100%);
    min-height: 100vh;
    text-align: center; 
    margin: 0;
    padding: 20px;
  }
  
  h1 { 
    color: #0277bd; 
    background-color: rgba(255, 255, 255, 0.9);
    display: inline-block;
    padding: 10px 30px;
    border-radius: 20px;
    border: 3px dashed #4fc3f7;
    box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
  }
  
  #word-bank { 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    margin: 20px auto 40px auto; 
    min-height: 60px; 
    flex-wrap: wrap; 
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.85);
    border-radius: 15px;
    border: 2px dashed #0288d1;
    width: 90%;
    box-shadow: 0px 4px 6px rgba(0,0,0,0.05);
  }
  
  .tile { 
    padding: 10px 20px; 
    background-color: #fff9c4; 
    border: 2px solid #fbc02d; 
    border-radius: 10px; 
    cursor: grab; 
    font-size: 24px; 
    font-weight: bold; 
    user-select: none; 
    box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
  }
  .tile:active { cursor: grabbing; }
  
  .highlight { 
    color: #d32f2f; 
  }

  #columns { 
    display: flex; 
    justify-content: space-around; 
    gap: 10px; 
    width: 100%;
  }
  
  .column { 
    flex: 1; 
    background-color: rgba(255, 255, 255, 0.9); 
    border: 3px dashed #29b6f6; 
    border-radius: 15px; 
    min-height: 400px; 
    padding: 10px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 10px; 
    box-shadow: 0px 4px 6px rgba(0,0,0,0.05);
  }
  
  /* Style for the emoji visual clues */
  .clue-icon {
    font-size: 50px;
    margin-top: 10px;
    margin-bottom: -10px;
  }
  
  .column h2 { 
    background-color: #29b6f6; 
    color: white;
    padding: 10px; 
    border-radius: 10px; 
    width: 80%; 
    margin-top: 0; 
  }
</style>
</head>
<body>
  <h1>Sort the Long 'O' Words!</h1>
  
  <div id="word-bank"></div>
  
  <div id="columns">
    <div class="column" data-pattern="o_e" ondragover="allowDrop(event)" ondrop="drop(event)">
      <div class="clue-icon">🦴</div>
      <h2>o_e</h2>
    </div>
    <div class="column" data-pattern="oa" ondragover="allowDrop(event)" ondrop="drop(event)">
      <div class="clue-icon">⛵</div>
      <h2>oa</h2>
    </div>
    <div class="column" data-pattern="ow" ondragover="allowDrop(event)" ondrop="drop(event)">
      <div class="clue-icon">❄️</div>
      <h2>ow</h2>
    </div>
    <div class="column" data-pattern="o" ondragover="allowDrop(event)" ondrop="drop(event)">
      <div class="clue-icon">🤖</div>
      <h2>o</h2>
    </div>
    <div class="column" data-pattern="oe" ondragover="allowDrop(event)" ondrop="drop(event)">
      <div class="clue-icon">🦶</div>
      <h2>oe</h2>
    </div>
  </div>

  <script>
    const words = [
      { text: 'b<span class="highlight">o</span>n<span class="highlight">e</span>', pattern: 'o_e' },
      { text: 'r<span class="highlight">o</span>p<span class="highlight">e</span>', pattern: 'o_e' },
      { text: 'b<span class="highlight">oa</span>t', pattern: 'oa' },
      { text: 'c<span class="highlight">oa</span>t', pattern: 'oa' },
      { text: 'sn<span class="highlight">ow</span>', pattern: 'ow' },
      { text: 'gr<span class="highlight">ow</span>', pattern: 'ow' },
      { text: 'g<span class="highlight">o</span>', pattern: 'o' },
      { text: 's<span class="highlight">o</span>', pattern: 'o' },
      { text: 't<span class="highlight">oe</span>', pattern: 'oe' },
      { text: 'h<span class="highlight">oe</span>', pattern: 'oe' }
    ];

    const wordBank = document.getElementById('word-bank');

    words.forEach((wordObj, index) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = wordObj.text;
      tile.draggable = true;
      tile.id = 'word-' + index;
      tile.dataset.pattern = wordObj.pattern; 
      tile.ondragstart = drag;
      wordBank.appendChild(tile);
    });

    function allowDrop(ev) {
      ev.preventDefault();
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      const draggedElement = document.getElementById(data);
      const dropZone = ev.target.closest('.column');
      
      if (dropZone && draggedElement.dataset.pattern === dropZone.dataset.pattern) {
        dropZone.appendChild(draggedElement);
      } else {
        alert("Oops! Try looking closely at the highlighted letters and the picture clue!");
      }
    }
  </script>
</body>
</html>
