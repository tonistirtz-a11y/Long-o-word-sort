<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long O Sorting Game</title>
<style>
  body { 
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
    background-color: #f0f8ff; 
    text-align: center; 
    margin: 0;
    padding: 20px;
  }
  h1 { color: #333; }
  
  #word-bank { 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    margin: 20px auto 40px auto; 
    min-height: 60px; 
    flex-wrap: wrap; 
    padding: 20px;
    background-color: #e6f2ff;
    border-radius: 15px;
    border: 2px dashed #b3d9ff;
    width: 90%;
  }
  
  .tile { 
    padding: 10px 20px; 
    background-color: #ffe4b5; 
    border: 2px solid #ff8c00; 
    border-radius: 10px; 
    cursor: grab; 
    font-size: 24px; 
    font-weight: bold; 
    user-select: none; 
    box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
  }
  .tile:active { cursor: grabbing; }
  
  .highlight { 
    color: #e60000; 
  }

  #columns { 
    display: flex; 
    justify-content: space-around; 
    gap: 10px; 
    width: 100%;
  }
  
  .column { 
    flex: 1; 
    background-color: #ffffff; 
    border: 3px dashed #87ceeb; 
    border-radius: 15px; 
    min-height: 400px; 
    padding: 10px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 10px; 
  }
  
  .column h2 { 
    background-color: #87ceeb; 
    color: white;
    padding: 10px; 
    border-radius: 10px; 
    width: 80%; 
    margin-top: 0; 
  }
</style>
</head>
<body>
  <h1>Sort the Long 'O' Words!</h1>
  
  <div id="word-bank"></div>
  
  <div id="columns">
    <div class="column" data-pattern="o_e" ondragover="allowDrop(event)" ondrop="drop(event)"><h2>o_e</h2></div>
    <div class="column" data-pattern="oa" ondragover="allowDrop(event)" ondrop="drop(event)"><h2>oa</h2></div>
    <div class="column" data-pattern="ow" ondragover="allowDrop(event)" ondrop="drop(event)"><h2>ow</h2></div>
    <div class="column" data-pattern="o" ondragover="allowDrop(event)" ondrop="drop(event)"><h2>o</h2></div>
    <div class="column" data-pattern="oe" ondragover="allowDrop(event)" ondrop="drop(event)"><h2>oe</h2></div>
  </div>

  <script>
    // Word list with HTML highlighting built in
    const words = [
      { text: 'b<span class="highlight">o</span>n<span class="highlight">e</span>', pattern: 'o_e' },
      { text: 'r<span class="highlight">o</span>p<span class="highlight">e</span>', pattern: 'o_e' },
      { text: 'b<span class="highlight">oa</span>t', pattern: 'oa' },
      { text: 'c<span class="highlight">oa</span>t', pattern: 'oa' },
      { text: 'sn<span class="highlight">ow</span>', pattern: 'ow' },
      { text: 'gr<span class="highlight">ow</span>', pattern: 'ow' },
      { text: 'g<span class="highlight">o</span>', pattern: 'o' },
      { text: 's<span class="highlight">o</span>', pattern: 'o' },
      { text: 't<span class="highlight">oe</span>', pattern: 'oe' },
      { text: 'h<span class="highlight">oe</span>', pattern: 'oe' }
    ];

    const wordBank = document.getElementById('word-bank');

    // Generate the draggable tiles
    words.forEach((wordObj, index) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = wordObj.text;
      tile.draggable = true;
      tile.id = 'word-' + index;
      tile.dataset.pattern = wordObj.pattern; // Used to check correct column
      tile.ondragstart = drag;
      wordBank.appendChild(tile);
    });

    function allowDrop(ev) {
      ev.preventDefault();
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      const draggedElement = document.getElementById(data);
      const dropZone = ev.target.closest('.column');
      
      // Check if dropped in a column and if the pattern matches
      if (dropZone && draggedElement.dataset.pattern === dropZone.dataset.pattern) {
        dropZone.appendChild(draggedElement);
      } else {
        alert("Oops! Try looking closely at the highlighted letters.");
      }
    }
  </script>
</body>
</html>
